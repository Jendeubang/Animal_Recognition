server:
  port: 8081

# Python AI 服务地址（可以配成远程服务器 IP）
ai:
  service:
    url: http://localhost:8000

spring:
  application:
    name: animal-recognition-client

  # ── MySQL 数据库配置 ──
  datasource:
    url: jdbc:mysql://localhost:3306/animal_recognition?useUnicode=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai
    username: root
    password: 202811
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA 配置 ──
  jpa:
    hibernate:
      ddl-auto: update          # 自动建表/更新表结构
    show-sql: false              # 生产环境建议 false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 文件上传限制（照片通常几个 MB）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
