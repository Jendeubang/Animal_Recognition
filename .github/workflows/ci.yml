# ============================================================
# 动物识别系统 - GitHub Actions CI 流水线
# 学号姓名: ____________
# ============================================================
name: Animal Recognition CI

# 触发条件：push 到任意分支，或手动触发
on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # 支持手动触发

jobs:
  # ──────────── Job 1: Python 检查和测试 ────────────
  python-ci:
    runs-on: ubuntu-latest
    # 质量门禁：失败则不继续后续 job
    # （GitHub Actions 默认 fail-fast）

    steps:
      # 阶段1：拉取代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # 阶段2：设置 Python 环境
      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'         # 缓存 pip 依赖加速构建

      # 阶段3：安装依赖
      - name: 📦 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      # 阶段4：代码静态检查
      - name: 🔍 Python 语法检查
        run: |
          python -m py_compile python/train.py
          python -m py_compile python/predict_api.py
          echo "✅ Python 语法检查通过"

      # 阶段5：执行单元测试
      - name: 🧪 执行 Python 测试
        run: |
          python -m pytest python/test_ci.py -v --tb=short
        # ❌ 如果测试失败，流水线在此中止（质量门禁）

  # ──────────── Job 2: Java 编译检查 ────────────
  java-ci:
    runs-on: ubuntu-latest
    # 依赖 Python job 成功后执行
    needs: python-ci

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Maven 编译
        run: |
          cd java-client
          mvn compile -q
          echo "✅ Java 编译通过"

      # CI 环境无 MySQL，跳过需数据库的测试
      # 本地运行请用: mvn test

  # ──────────── Job 3: 通知（可选） ────────────
  notify:
    runs-on: ubuntu-latest
    if: always()              # 无论成功失败都执行
    needs: [python-ci, java-ci]

    steps:
      - name: 📢 输出构建结果
        run: |
          echo "========================================"
          echo "  🐾 动物识别 CI 流水线执行完成"
          echo "========================================"
          echo "  Python CI: ${{ needs.python-ci.result }}"
          echo "  Java CI:   ${{ needs.java-ci.result }}"
          echo "========================================"
          if [ "${{ needs.python-ci.result }}" = "success" ] && \
             [ "${{ needs.java-ci.result }}" = "success" ]; then
            echo "✅ 全部通过！"
          else
            echo "❌ 存在失败阶段，请检查日志"
            exit 1    # 质量门禁：通知失败也标记构建失败
          fi
